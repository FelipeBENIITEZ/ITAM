services:
  postgres:
    image: postgres:14
    container_name: postgres-itam
    environment:
      POSTGRES_DB: ITASSET
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: itam2025
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: itam-app
    depends_on:
      - postgres
    environment:
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ITASSET
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=itam2025
      - SERVER_PORT=9090
    ports:
      - "9090:9090"
    restart: unless-stopped


volumes:
  postgres-data:
