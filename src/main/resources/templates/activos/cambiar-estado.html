<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Cambiar estado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('activos')}"></div>

<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <p class="text-uppercase text-muted fw-semibold mb-1">Cambio de estado</p>
            <h1 class="h4">Cambiar estado</h1>
            <p class="text-muted mb-3" th:text="${activo.activoNom}">Activo</p>
            <form th:action="@{/activos/{id}/cambiar-estado(id=${activo.activoId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="mb-3">
                    <label class="form-label">Nuevo estado</label>
                    <select class="form-select" name="nuevoEstadoId" required>
                        <option value="">Seleccionar...</option>
                        <option th:each="estado : ${estadosPosibles}" th:value="${estado.estadoId}" th:text="${estado.estadoNom}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Motivo</label>
                    <input class="form-control" type="text" name="motivo" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea class="form-control" name="observaciones" rows="3"></textarea>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-secondary" th:href="@{/activos/{id}(id=${activo.activoId})}">Cancelar</a>
                    <button class="btn btn-primary" type="submit">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
