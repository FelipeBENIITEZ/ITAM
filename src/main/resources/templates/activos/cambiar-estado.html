<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Operacion del activo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('activos')}"></div>

<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <p class="text-uppercase text-muted fw-semibold mb-1">Operacion del activo</p>
            <h1 class="h4" th:text="${tituloOperacion}">Operacion</h1>
            <p class="text-muted mb-3" th:text="${descripcionOperacion}">Descripcion</p>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card border-0 bg-body-tertiary h-100">
                        <div class="card-body">
                            <div class="text-muted small mb-1">Codigo</div>
                            <div class="fw-semibold" th:text="${activo.activoCodigo}">ACT-001</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-0 bg-body-tertiary h-100">
                        <div class="card-body">
                            <div class="text-muted small mb-1">Nombre</div>
                            <div class="fw-semibold" th:text="${activo.activoNom}">Activo</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-0 bg-body-tertiary h-100">
                        <div class="card-body">
                            <div class="text-muted small mb-1">Estado actual</div>
                            <div class="fw-semibold" th:text="${estadoActual}">Disponible</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-0 bg-body-tertiary h-100">
                        <div class="card-body">
                            <div class="text-muted small mb-1">Estado resultante</div>
                            <div class="fw-semibold" th:text="${estadoResultante}">En mantenimiento</div>
                        </div>
                    </div>
                </div>
            </div>

            <form th:action="@{/activos/{codigo}/operacion(codigo=${activo.activoCodigo})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="operacion" th:value="${operacion}" />

                <div class="mb-3">
                    <label class="form-label">Motivo *</label>
                    <input class="form-control" type="text" name="motivo" required>
                    <div class="form-text">El motivo es obligatorio para registrar el historial.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea class="form-control" name="observaciones" rows="3"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-secondary d-inline-flex align-items-center gap-2" th:href="@{/activos/{codigo}(codigo=${activo.activoCodigo})}">
                        <span class="itas-icon icon-volver icon-button"></span>
                        <span>Cancelar</span>
                    </a>
                    <button class="btn btn-primary d-inline-flex align-items-center gap-2" type="submit">
                        <span class="itas-icon icon-enviar icon-button"></span>
                        <span>Confirmar operacion</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
