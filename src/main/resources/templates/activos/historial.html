<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('activos')}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <p class="text-uppercase text-muted fw-semibold mb-1">Auditoria basica</p>
            <h1 class="h4 mb-1 icon-label-inline"><img th:src="@{/iconos/navegacion/historial_icon.svg}" class="icon icon-section" alt=""><span>Historial de activo</span></h1>
            <p class="text-muted mb-0" th:text="${activo.activoNom}">Activo</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/activos/{codigo}(codigo=${activo.activoCodigo})}">Volver</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body" th:if="${historialOperativo != null and !historialOperativo.isEmpty()}">
            <div class="border rounded-3 bg-body-tertiary p-3 mb-3" th:each="item : ${historialOperativo}">
                <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-2">
                    <div>
                        <span class="badge text-bg-primary mb-2" th:text="${item.tipoEvento}">EVENTO</span>
                        <div class="fw-semibold" th:text="${item.titulo}">Titulo</div>
                    </div>
                    <div class="text-muted small" th:text="${item.fecha != null ? #temporals.format(item.fecha, 'dd/MM/yyyy HH:mm') : '-'}">Fecha</div>
                </div>
                <div class="mb-2" th:text="${item.descripcion}">Descripcion</div>
                <div class="row g-2 small text-muted">
                    <div class="col-md-6" th:if="${item.usuarioAnterior != null}">
                        <strong>Usuario anterior:</strong>
                        <span th:text="${item.usuarioAnterior}">-</span>
                    </div>
                    <div class="col-md-6" th:if="${item.usuarioNuevo != null}">
                        <strong>Usuario nuevo:</strong>
                        <span th:text="${item.usuarioNuevo}">-</span>
                    </div>
                    <div class="col-md-6">
                        <strong>Ejecutado por:</strong>
                        <span th:text="${item.usuarioEjecutor != null ? item.usuarioEjecutor : 'No registrado'}">No registrado</span>
                    </div>
                    <div class="col-md-6" th:if="${item.solicitudId != null}">
                        <strong>Solicitud relacionada:</strong>
                        <span th:text="|#${item.solicitudId}|">#0</span>
                    </div>
                    <div class="col-12" th:if="${item.motivo != null and !#strings.isEmpty(item.motivo)}">
                        <strong>Motivo:</strong>
                        <span th:text="${item.motivo}">Motivo</span>
                    </div>
                    <div class="col-12" th:if="${item.observacion != null and !#strings.isEmpty(item.observacion)}">
                        <strong>Observacion:</strong>
                        <span th:text="${item.observacion}">Observacion</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-body" th:if="${historialOperativo == null or historialOperativo.isEmpty()}">
            <div class="alert alert-light border mb-0">Sin registros.</div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
