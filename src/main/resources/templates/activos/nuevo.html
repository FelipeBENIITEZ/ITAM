<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Activo - ITASSET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 bg-primary text-white p-3 mb-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Nuevo Activo</h2>
                    <a href="/activos" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Volver
                    </a>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="fas fa-box me-2"></i>Datos del activo</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/activos/guardar}" method="post">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label for="activoCodigo" class="form-label">Codigo unico *</label>
                                    <input type="text" class="form-control" id="activoCodigo" name="activoCodigo"
                                           maxlength="50" placeholder="Ej: IT-0001" required>
                                </div>

                                <div class="col-md-8">
                                    <label for="activoNom" class="form-label">Nombre *</label>
                                    <input type="text" class="form-control" id="activoNom" name="activoNom"
                                           maxlength="150" placeholder="Ej: Notebook Dell Latitude 5430" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="proveedorId" class="form-label">Proveedor</label>
                                    <select class="form-select" id="proveedorId" name="proveedorId">
                                        <option value="">Sin proveedor</option>
                                        <option th:each="proveedor : ${proveedores}"
                                                th:value="${proveedor.provId}"
                                                th:text="${proveedor.provNom}">
                                            Proveedor
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="categoriaId" class="form-label">Categoria *</label>
                                    <select class="form-select" id="categoriaId" name="categoriaId" required>
                                        <option value="">Seleccionar categoria...</option>
                                        <option th:each="categoria : ${categorias}"
                                                th:value="${categoria.catId}"
                                                th:text="${categoria.catNom}">
                                            Categoria
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="estadoId" class="form-label">Estado inicial</label>
                                    <select class="form-select" id="estadoId" name="estadoId">
                                        <option value="">Usar estado por defecto</option>
                                        <option th:each="estado : ${estados}"
                                                th:value="${estado.estadoId}"
                                                th:text="${estado.estadoNom}">
                                            Estado
                                        </option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label for="activoDescri" class="form-label">Descripcion</label>
                                    <textarea class="form-control" id="activoDescri" name="activoDescri"
                                              rows="3" placeholder="Observaciones generales del activo"></textarea>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a href="/activos" class="btn btn-outline-secondary">
                                    <i class="fas fa-times me-1"></i>Cancelar
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save me-1"></i>Guardar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
