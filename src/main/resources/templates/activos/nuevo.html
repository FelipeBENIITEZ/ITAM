<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Activo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('activos')}"></div>

<main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
        <div>
            <p class="text-uppercase text-muted fw-semibold mb-1" th:text="${modoEdicion} ? 'Edición de activo' : 'Alta de activo'">Alta de activo</p>
            <h1 class="h3 mb-1" th:text="${modoEdicion} ? 'Editar activo' : 'Nuevo activo'">Nuevo activo</h1>
            <p class="text-muted mb-0">Formulario base para registrar un activo con sus catálogos principales.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/activos}">Volver</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${modoEdicion} ? @{/activos/actualizar/{id}(id=${activo.activoId})} : @{/activos/guardar}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Código *</label>
                        <input class="form-control" type="text" name="activoCodigo" th:value="${activo.activoCodigo}" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Nombre *</label>
                        <input class="form-control" type="text" name="activoNom" th:value="${activo.activoNom}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Categoría *</label>
                        <select class="form-select" name="categoriaId" required>
                            <option value="">Seleccionar...</option>
                            <option th:each="categoria : ${categorias}" th:value="${categoria.catId}" th:text="${categoria.catNom}" th:selected="${activo.categoria != null and activo.categoria.catId == categoria.catId}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Proveedor</label>
                        <select class="form-select" name="proveedorId">
                            <option value="">Sin proveedor</option>
                            <option th:each="proveedor : ${proveedores}" th:value="${proveedor.provId}" th:text="${proveedor.provNom}" th:selected="${activo.proveedor != null and activo.proveedor.provId == proveedor.provId}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" name="activoDescri" rows="3" th:text="${activo.activoDescri}"></textarea>
                    </div>

                    <div class="col-md-6" th:if="${!modoEdicion}">
                        <label class="form-label">Estado inicial</label>
                        <select class="form-select" name="estadoId">
                            <option value="">Usar estado por defecto</option>
                            <option th:each="estado : ${estados}" th:value="${estado.estadoId}" th:text="${estado.estadoNom}" th:selected="${activo.estado != null and activo.estado.estadoId == estado.estadoId}"></option>
                        </select>
                    </div>
                    <div class="col-md-6" th:if="${!modoEdicion}">
                        <label class="form-label">Asignar a usuario</label>
                        <select class="form-select" name="usuarioAsignadoId">
                            <option value="">No asignar ahora</option>
                            <option th:each="usuario : ${usuarios}" th:value="${usuario.usuId}" th:text="${usuario.persona != null ? usuario.persona.perNom1 + ' ' + usuario.persona.perApe1 + ' (' + usuario.usuLogin + ')' : usuario.usuLogin}"></option>
                        </select>
                    </div>
                    <div class="col-md-6" th:if="${!modoEdicion}">
                        <label class="form-label">Motivo de asignación</label>
                        <input class="form-control" type="text" name="asignacionMotivo" placeholder="Entrega inicial">
                    </div>

                    <div class="col-12" th:if="${modoEdicion}">
                        <div class="alert alert-info mb-0">
                            La edición de asignaciones se gestiona desde <a th:href="@{/movimientos}" class="alert-link">Asignaciones / Movimientos</a>.
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a class="btn btn-outline-secondary" th:href="@{/activos}">Cancelar</a>
                    <button class="btn btn-primary" type="submit" th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
