<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Módulo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('dashboard')}"></div>

<main class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body p-4 p-lg-5">
            <p class="text-uppercase text-muted fw-semibold mb-1">Módulo futuro</p>
            <h1 class="h3 mb-3" th:text="${tituloModulo}">Módulo</h1>
            <p class="text-muted mb-4" th:text="${descripcionModulo}">Descripción</p>
            <p class="mb-4">Esta sección queda preparada para una expansión posterior sin salir del sistema ITASSET.</p>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-primary" th:href="@{/dashboard}">Dashboard</a>
                <a class="btn btn-outline-primary" th:href="@{/activos}">Activos</a>
                <a class="btn btn-outline-primary" th:href="@{/catalogos}">Catálogos</a>
                <a class="btn btn-outline-primary" th:href="@{/movimientos}">Movimientos</a>
                <a class="btn btn-outline-primary" th:href="@{/informes}">Informes</a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
