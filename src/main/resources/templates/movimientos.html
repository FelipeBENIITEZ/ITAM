<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('movimientos')}"></div>

<main class="container-fluid py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
        <div>
            <p class="text-uppercase text-muted fw-semibold mb-1">Asignaciones operativas</p>
            <h1 class="h3 mb-1">Asignaciones / Movimientos</h1>
            <p class="text-muted mb-0">Asignar, devolver y revisar movimientos de activos sin duplicar asignaciones activas.</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/activos}">Ir a activos</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h5">Asignar activo</h2>
                    <form th:action="@{/movimientos/asignar}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="mb-3">
                            <label class="form-label">Activo</label>
                            <select class="form-select" name="activoId" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="activo : ${activosDisponibles}" th:value="${activo.activoId}" th:text="${activo.activoCodigo + ' - ' + activo.activoNom}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <select class="form-select" name="usuarioId" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="usuario : ${usuarios}" th:value="${usuario.usuId}" th:text="${usuario.persona != null ? usuario.persona.perNom1 + ' ' + usuario.persona.perApe1 + ' (' + usuario.usuLogin + ')' : usuario.usuLogin}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Motivo</label>
                            <input class="form-control" type="text" name="motivo" placeholder="Entrega inicial">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Observación</label>
                            <textarea class="form-control" name="observacion" rows="3"></textarea>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Asignar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table mb-0 align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Activo</th>
                            <th>Usuario</th>
                            <th>Fecha</th>
                            <th>Motivo</th>
                            <th class="text-end">Acción</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="asignacion : ${asignacionesActivas}">
                            <td th:text="${asignacion.activo != null ? asignacion.activo.activoNom : '-'}">Activo</td>
                            <td th:text="${asignacion.usuario != null and asignacion.usuario.persona != null ? asignacion.usuario.persona.perNom1 + ' ' + asignacion.usuario.persona.perApe1 : asignacion.usuario.usuLogin}">Usuario</td>
                            <td th:text="${asignacion.asignacionFecha}">Fecha</td>
                            <td th:text="${asignacion.asignacionMotivo != null ? asignacion.asignacionMotivo : '-'}">Motivo</td>
                            <td class="text-end">
                                <form th:action="@{/movimientos/devolver/{id}(id=${asignacion.asignacionId})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button class="btn btn-sm btn-outline-warning" type="submit">Devolver</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${asignacionesActivas == null or asignacionesActivas.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-4">No hay asignaciones activas.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
