<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Solicitud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('solicitudes')}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <p class="text-uppercase text-muted fw-semibold mb-1">Detalle de incidencia</p>
            <h1 class="h4 mb-1" th:text="'Solicitud #' + ${solicitud.soliId}">Solicitud</h1>
            <p class="text-muted mb-0" th:text="${solicitud.getEstadoSolicitud()}">Estado</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/solicitudes}">Volver</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <div class="mb-2"><strong>Tipo:</strong> <span th:text="${solicitud.getTipoSolicitud()}">Tipo</span></div>
                    <div class="mb-2"><strong>Usuario:</strong> <span th:text="${solicitud.getUsuarioNombre()}">Usuario</span></div>
                    <div class="mb-2"><strong>Motivo:</strong> <span th:text="${solicitud.soliMotivo != null ? solicitud.soliMotivo : '-'}">Motivo</span></div>
                    <div><strong>Descripción:</strong></div>
                    <div class="border rounded bg-white p-3" th:text="${solicitud.soliDescri}">Descripción</div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h6">Acciones</h2>
                    <div class="d-grid gap-2">
                        <a class="btn btn-outline-primary" th:href="@{/solicitudes/editar/{id}(id=${solicitud.soliId})}" th:if="${esPropietario and estaPendiente}">Editar</a>
                        <a class="btn btn-outline-danger" th:href="@{/solicitudes/{id}/rechazar(id=${solicitud.soliId})}" th:if="${esAdmin and estaPendiente}">Rechazar</a>
                        <form th:action="@{/solicitudes/{id}/aprobar(id=${solicitud.soliId})}" method="post" th:if="${esAdmin and estaPendiente}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-success w-100" type="submit">Aprobar</button>
                        </form>
                        <form th:action="@{/solicitudes/{id}/completar(id=${solicitud.soliId})}" method="post" th:if="${esAdmin and estaAprobada}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-primary w-100" type="submit">Completar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
