<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Solicitud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('solicitudes')}"></div>

<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <p class="text-uppercase text-muted fw-semibold mb-1">Alta o edición</p>
            <h1 class="h4">Nueva solicitud</h1>
            <form th:action="${solicitud.soliId != null} ? @{/solicitudes/actualizar/{id}(id=${solicitud.soliId})} : @{/solicitudes/guardar}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" name="soliTipo.soliTipoId" required>
                            <option value="">Seleccionar...</option>
                            <option th:each="tipo : ${tipos}" th:value="${tipo.soliTipoId}" th:text="${tipo.soliTipoNom}" th:selected="${solicitud.soliTipo != null and solicitud.soliTipo.soliTipoId == tipo.soliTipoId}"></option>
                        </select>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Motivo</label>
                        <input class="form-control" type="text" name="soliMotivo" th:value="${solicitud.soliMotivo}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" name="soliDescri" rows="5" th:text="${solicitud.soliDescri}" required></textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a class="btn btn-outline-secondary" th:href="@{/solicitudes}">Cancelar</a>
                    <button class="btn btn-primary" type="submit" th:text="${solicitud.soliId != null} ? 'Actualizar' : 'Guardar'">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
