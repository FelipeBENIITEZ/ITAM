<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Incidencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('solicitudes')}"></div>

<main class="container-fluid py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
        <div>
            <p class="text-uppercase text-muted fw-semibold mb-1">Soporte básico</p>
            <h1 class="h3 mb-1">Soporte / Incidencias</h1>
            <p class="text-muted mb-0">Incidencias básicas asociadas a activos.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/solicitudes/estadisticas}">Estadísticas</a>
            <a class="btn btn-primary" th:href="@{/solicitudes/nueva}">Nueva incidencia</a>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <form method="get" th:action="@{/solicitudes}">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Buscar</label>
                        <input class="form-control" type="text" name="buscar" th:value="${buscar}" placeholder="Texto en la descripción">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Estado</label>
                        <select class="form-select" name="estadoId">
                            <option value="">Todos</option>
                            <option th:each="estado : ${estados}" th:value="${estado.soliEstadoId}" th:text="${estado.soliEstadoNom}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" name="tipoId">
                            <option value="">Todos</option>
                            <option th:each="tipo : ${tipos}" th:value="${tipo.soliTipoId}" th:text="${tipo.soliTipoNom}"></option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-dark w-100" type="submit">Filtrar</button>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <a class="btn btn-outline-secondary w-100" th:href="@{/solicitudes}">Limpiar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Descripción</th>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th>Usuario</th>
                    <th class="text-end">Acción</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="solicitud : ${solicitudes}">
                    <td th:text="${solicitud.soliId}">1</td>
                    <td th:text="${solicitud.getDescripcionCorta()}">Descripción</td>
                    <td th:text="${solicitud.getTipoSolicitud()}">Tipo</td>
                    <td th:text="${solicitud.getEstadoSolicitud()}">Estado</td>
                    <td th:text="${solicitud.getUsuarioNombre()}">Usuario</td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/solicitudes/{id}(id=${solicitud.soliId})}">Ver</a>
                    </td>
                </tr>
                <tr th:if="${solicitudes == null or solicitudes.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">No hay incidencias.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3" th:if="${usaLista == false and totalPaginas != null and totalPaginas > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/solicitudes(pagina=${paginaActual - 1})}">Anterior</a>
            </li>
            <li class="page-item" th:each="pagina : ${#numbers.sequence(0, totalPaginas - 1)}" th:classappend="${pagina == paginaActual} ? 'active' : ''">
                <a class="page-link" th:href="@{/solicitudes(pagina=${pagina})}" th:text="${pagina + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${paginaActual >= totalPaginas - 1} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/solicitudes(pagina=${paginaActual + 1})}">Siguiente</a>
            </li>
        </ul>
    </nav>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
