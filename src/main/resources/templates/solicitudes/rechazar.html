<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITASSET | Rechazar solicitud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/app-nav :: nav('solicitudes')}"></div>

<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <p class="text-uppercase text-muted fw-semibold mb-1">Soporte basico</p>
            <h1 class="h4 mb-3" th:text="|Rechazar solicitud #${solicitud.soliId}|">Rechazar solicitud</h1>

            <form th:action="@{/solicitudes/{id}/rechazar(id=${solicitud.soliId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="mb-3">
                    <label class="form-label">Observacion obligatoria</label>
                    <textarea class="form-control" name="observacion" rows="5" required></textarea>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-secondary d-inline-flex align-items-center gap-2" th:href="@{/solicitudes/{id}(id=${solicitud.soliId})}">
                        <span class="itas-icon icon-volver icon-button"></span>
                        <span>Cancelar</span>
                    </a>
                    <button class="btn btn-danger" type="submit">Confirmar rechazo</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
